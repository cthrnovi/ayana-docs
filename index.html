<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1a1a1a;
            background: #fafafa;
            line-height: 1.6;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 24px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 48px;
        }
        .divider {
            border: none;
            border-top: 1px solid #e5e5e5;
            margin-bottom: 32px;
        }
        .doc-list {
            list-style: none;
        }
        .doc-list li {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .doc-list a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
        }
        .doc-list a:hover {
            text-decoration: underline;
        }
        .empty {
            color: #999;
            font-style: italic;
            padding: 24px 0;
        }
        footer {
            margin-top: 64px;
            color: #aaa;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Documentation</h1>
        <p class="subtitle">Shareable HTML documents</p>
        <hr class="divider">

        <ul class="doc-list" id="doc-list">
            <!-- Add links to documents here, e.g.: -->
            <!-- <li><a href="example.html">Example Document</a></li> -->
        </ul>

        <p class="empty" id="empty-message">No documents yet.</p>

        <footer>&copy; 2026</footer>
    </div>
</body>
</html>
